# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuring-dependabot-version-updates
version: 2

updates:
  # --- Python (backend) ---
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      fastapi:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "pydantic"
          - "pydantic-settings"
      sqlalchemy:
        patterns:
          - "sqlalchemy"
          - "alembic"
          - "psycopg2-binary"
          - "pyodbc"
      auth:
        patterns:
          - "python-jose"
          - "passlib"
          - "bcrypt"
    ignore:
      # bcrypt 5.x has API breaks vs the pinned 4.2.1; ignore major bumps
      - dependency-name: "bcrypt"
        update-types: ["version-update:semver-major"]

  # --- Node (frontend) ---
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
      radix:
        patterns:
          - "@radix-ui/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
          - "typescript-eslint"
          - "eslint"

  # --- GitHub Actions ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
