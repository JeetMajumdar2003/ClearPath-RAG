name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prettier-check:
    name: Prettier (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install prettier
        run: npm install --no-save prettier@^3.3.3
      - name: Check formatting
        run: npx prettier --check "**/*.{md,json,yml,yaml,ts,tsx,js,jsx,css}" --ignore-path .prettierignore

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
          config: |
            {
              "default": true,
              "MD013": false,
              "MD024": { "siblings_only": true },
              "MD041": false
            }
