name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same ref on a new push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Backend: lint + pytest (SQLite in-memory, Azure SQL mocked)
  # ------------------------------------------------------------------
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff) — install only if requested
        working-directory: backend
        run: |
          pip install ruff==0.6.9 || true
          ruff check app tests || echo "ruff not configured — skipping"

      - name: Run pytest
        working-directory: backend
        env:
          # Provide safe defaults so pydantic-settings doesn't trip on missing .env.
          SECRET_KEY: test-secret-key-for-github-actions-only-not-for-production
          SQL_SERVER: ""
          POSTGRES_HOST: localhost
          APP_ENV: test
        run: |
          pytest -v --tb=short

  # ------------------------------------------------------------------
  # Frontend: install, lint, type-check, build
  # ------------------------------------------------------------------
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type-check + Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

  # ------------------------------------------------------------------
  # Docker: build images (best-effort, no Azure creds so no push)
  # ------------------------------------------------------------------
  docker:
    name: Docker build (compose sanity)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        working-directory: backend
        run: docker build -t clearpath-backend:ci .

      - name: Build frontend image
        working-directory: frontend
        run: docker build -t clearpath-frontend:ci .
